name: Refresh FIFA 2026 data

# Pulls the latest World Cup 2026 stats every 6 hours, regenerates the Claude
# summaries/predictions, and commits the refreshed cache back to the repo.
on:
  schedule:
    - cron: "0 */6 * * *"   # 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch: {}      # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: fifa-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh cache (stats + AI)
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m fifa.fetch --with-ai

      - name: Commit refreshed cache
        run: |
          git config user.name "fifa-refresh-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/cache
          if git diff --quiet --cached; then
            echo "No changes to commit."
          else
            git commit -m "data: refresh $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          fi
